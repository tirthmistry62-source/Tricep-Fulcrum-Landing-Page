kind = "web"
previewPath = "/"
title = "Tricep Fulcrum"
version = "1.0.0"
id = "artifacts/tricep-fulcrum"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21205

[services.development]
run = "pnpm --filter @workspace/tricep-fulcrum run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tricep-fulcrum", "run", "build" ]
publicDir = "artifacts/tricep-fulcrum/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21205"
BASE_PATH = "/"
